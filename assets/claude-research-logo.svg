<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>

    <!-- Core glow gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="1"/>
      <stop offset="40%" stop-color="#c96b3a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c2d0a" stop-opacity="0"/>
    </radialGradient>

    <!-- Orbit ring gradient -->
    <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#c96b3a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="orbitGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#3a7cc9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7eb8f7" stop-opacity="0.8"/>
    </linearGradient>

    <linearGradient id="orbitGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Inner anthropic-style glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="coreFilter">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- DNA/code helix clip -->
    <clipPath id="logoClip">
      <circle cx="200" cy="200" r="170"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Subtle star field -->
  <g opacity="0.4">
    <circle cx="60" cy="45" r="1" fill="white"/>
    <circle cx="340" cy="80" r="1.2" fill="white"/>
    <circle cx="120" cy="350" r="0.8" fill="white"/>
    <circle cx="370" cy="310" r="1" fill="white"/>
    <circle cx="30" cy="260" r="0.9" fill="white"/>
    <circle cx="280" cy="30" r="1" fill="white"/>
    <circle cx="355" cy="170" r="0.7" fill="white"/>
    <circle cx="50" cy="160" r="1.1" fill="white"/>
    <circle cx="310" cy="370" r="0.8" fill="white"/>
    <circle cx="170" cy="370" r="1" fill="white"/>
    <circle cx="90" cy="100" r="0.6" fill="white"/>
    <circle cx="330" cy="130" r="0.8" fill="white"/>
  </g>

  <!-- Outer ambient glow halo -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="#e8a87c" stroke-width="0.5" opacity="0.08"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#e8a87c" stroke-width="0.5" opacity="0.06"/>

  <!-- Orbital ring 3 (outermost - purple, tilted) -->
  <g transform="rotate(-30, 200, 200)">
    <ellipse cx="200" cy="200" rx="148" ry="48"
      fill="none" stroke="url(#orbitGrad3)" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Orbital ring 2 (middle - blue, tilted other way) -->
  <g transform="rotate(50, 200, 200)">
    <ellipse cx="200" cy="200" rx="120" ry="40"
      fill="none" stroke="url(#orbitGrad2)" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Orbital ring 1 (inner - warm, near horizontal) -->
  <g transform="rotate(10, 200, 200)">
    <ellipse cx="200" cy="200" rx="95" ry="28"
      fill="none" stroke="url(#orbitGrad1)" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Orbit node dots -->
  <!-- Outer purple ring nodes -->
  <g transform="rotate(-30, 200, 200)" filter="url(#glow)">
    <circle cx="348" cy="200" r="4" fill="#a78bfa"/>
    <circle cx="52" cy="200" r="3" fill="#a78bfa" opacity="0.7"/>
    <circle cx="290" cy="172" r="2.5" fill="#c4b5fd" opacity="0.8"/>
  </g>

  <!-- Middle blue ring nodes -->
  <g transform="rotate(50, 200, 200)" filter="url(#glow)">
    <circle cx="320" cy="200" r="4.5" fill="#7eb8f7"/>
    <circle cx="80" cy="200" r="2.5" fill="#7eb8f7" opacity="0.6"/>
    <circle cx="240" cy="162" r="3" fill="#93c5fd" opacity="0.9"/>
  </g>

  <!-- Inner warm ring nodes -->
  <g transform="rotate(10, 200, 200)" filter="url(#glow)">
    <circle cx="295" cy="200" r="3.5" fill="#f4a460"/>
    <circle cx="105" cy="200" r="3" fill="#f4a460" opacity="0.7"/>
  </g>

  <!-- Core ambient glow -->
  <circle cx="200" cy="200" r="55" fill="url(#coreGlow)" opacity="0.6" filter="url(#coreFilter)"/>

  <!-- Claude "C" monogram core - stylized -->
  <!-- Outer C-ring (the Anthropic-style half-arc) -->
  <g filter="url(#softGlow)">
    <path d="M 200 148
             A 52 52 0 1 0 200 252"
          fill="none"
          stroke="#e8a87c"
          stroke-width="7"
          stroke-linecap="round"
          opacity="0.95"/>
  </g>

  <!-- Inner C detail -->
  <path d="M 200 162
           A 38 38 0 1 0 200 238"
        fill="none"
        stroke="#c96b3a"
        stroke-width="3.5"
        stroke-linecap="round"
        opacity="0.7"/>

  <!-- Code brackets inside the C -->
  <g fill="none" stroke="#7eb8f7" stroke-width="2" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <!-- < bracket -->
    <polyline points="175,188 163,200 175,212"/>
    <!-- > bracket -->
    <polyline points="208,188 220,200 208,212"/>
  </g>

  <!-- Center dot / nucleus -->
  <circle cx="200" cy="200" r="5" fill="#f8d5b0" filter="url(#glow)" opacity="0.95"/>
  <circle cx="200" cy="200" r="2.5" fill="white" opacity="0.9"/>

  <!-- Tick marks suggesting evolution/recursion around the core C -->
  <g stroke="#e8a87c" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
    <line x1="200" y1="139" x2="200" y2="146"/>
    <line x1="220" y1="141" x2="217" y2="147.5"/>
    <line x1="236" y1="147" x2="231" y2="152"/>
    <line x1="248" y1="157" x2="242" y2="160.5"/>
  </g>

  <!-- Subtle circuit trace lines in background -->
  <g stroke="#e8a87c" stroke-width="0.6" opacity="0.12" fill="none">
    <path d="M 80 200 L 110 200 L 120 180 L 140 180"/>
    <path d="M 320 200 L 290 200 L 280 220 L 260 220"/>
    <path d="M 200 80 L 200 110 L 220 120 L 220 140"/>
    <path d="M 200 320 L 200 290 L 180 280 L 180 260"/>
  </g>
  <g fill="#e8a87c" opacity="0.25">
    <circle cx="110" cy="200" r="2"/>
    <circle cx="290" cy="200" r="2"/>
    <circle cx="200" cy="110" r="2"/>
    <circle cx="200" cy="290" r="2"/>
  </g>

</svg>
