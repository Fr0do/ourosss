name: Bug Report
description: Report a bug in the bot, CI, or infrastructure
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: How can this be reproduced?

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual
      description: What did you expect to happen, and what happened instead?

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      placeholder: "e.g. kurkin-1, local mac, GitHub Actions"
