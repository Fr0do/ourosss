name: RTK Badge

on:
  push:
    paths:
      - '.github/rtk-badge.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read badge data
        id: badge
        run: |
          echo "json=$(cat .github/rtk-badge.json)" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.RTK_BADGE_GIST_ID }}
          filename: rtk-savings.json
          label: RTK savings
          message: ${{ fromJSON(steps.badge.outputs.json).message }}
          color: ${{ fromJSON(steps.badge.outputs.json).color }}
