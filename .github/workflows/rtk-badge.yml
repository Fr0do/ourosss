name: RTK Badge

# Badge JSON is updated locally via `rtk gain` and committed.
# Shields.io reads it directly from the repo raw URL:
# https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/Fr0do/ouroboros/main/.github/rtk-badge.json

on:
  push:
    paths:
      - '.github/rtk-badge.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate badge JSON
        run: jq -e '.message and .color' .github/rtk-badge.json
