name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run ruff
        run: uv run ruff check .
