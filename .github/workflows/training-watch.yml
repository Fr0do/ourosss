name: Training Watch

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check training and alert
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Secrets passed as env vars into the remote script
          envs: TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          script: |
            STATE_FILE="/tmp/ouroboros-training-state"
            PREV=$(cat "$STATE_FILE" 2>/dev/null || echo "idle")

            PROC=$(pgrep -af "accelerate|python.*train" 2>/dev/null | head -1 || true)
            GPU_UTIL=$(nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader 2>/dev/null \
              | head -1 | tr -d ' %' || echo "N/A")

            send_tg() {
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                -d text="$1" -d parse_mode="Markdown" -d disable_web_page_preview="true" > /dev/null
            }

            if [ -n "$PROC" ]; then
              PROJECT=$(echo "$PROC" | grep -oP 's_cot|mmred|bbbo' | head -1 || echo "unknown")
              echo "running:${PROJECT}" > "$STATE_FILE"

              # Stall check: process exists but GPU idle
              if [ "$GPU_UTIL" != "N/A" ] && [ "$GPU_UTIL" -lt 5 ] 2>/dev/null; then
                send_tg "⚠️ *Training stalled?* Project: \`${PROJECT}\` — GPU at ${GPU_UTIL}% but process running"
              fi
            else
              echo "idle" > "$STATE_FILE"
              # Completed or crashed: was running last check, now gone
              if echo "$PREV" | grep -q "^running:"; then
                PROJECT=$(echo "$PREV" | cut -d: -f2)
                send_tg "🏁 *Training ended* — project \`${PROJECT}\` process no longer running. Completed or crashed."
              fi
            fi
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
